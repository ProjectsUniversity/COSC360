<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/common.css">
    <link rel="stylesheet" href="../CSS/apply.css">
    <title>Apply for Job</title>
</head>
<body>
    <main class="container">
        <nav class="nav-back">
            <a href="homepage.html" class="back-link">&larr; Back to Jobs</a>
        </nav>
        
        <header class="application-header">
            <h1>Apply for <span id="job-title">Job Position</span></h1>
            <a href="#" id="company-website" class="company-link" target="_blank">Visit Company Website</a>
        </header>

        <form class="application-form" action="homepage.html" method="POST">
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" name="full-name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="cover-letter">Cover Letter</label>
                <textarea id="cover-letter" name="cover-letter" rows="6" required></textarea>
            </div>

            <div class="form-group file-upload">
                <label for="resume">Resume (PDF)</label>
                <input type="file" id="resume" name="resume" accept=".pdf" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Submit Application</button>
            </div>
        </form>
    </main>

    <script src="/HTML, CSS, JS/JS/apply.js"></script>
</body>
</html>
