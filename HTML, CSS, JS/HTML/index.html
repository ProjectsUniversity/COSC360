<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobSwipe - Find Your Next Job</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/HTML, CSS, JS/CSS/homepage.css" />
  <link rel="stylesheet" href="/HTML, CSS, JS/CSS/sidebar.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>JobSwipe</h1>
    </div>
    <nav class="nav nav-pills flex-column flex-grow-1">
        <a href="#" class="nav-link active">
            <i class="fas fa-home me-2"></i>
            Home
        </a>
        
      <a href="#" class="nav-link disabled link-dark">
        <i class="fas fa-bookmark me-2"></i>
        Saved Jobs
      </a>
      <a href="#" class="nav-link disabled link-dark">
        <i class="fas fa-file-alt me-2"></i>
        Applications
      </a>
    </nav>
    <div class="m-auto p-4">
        <hr class="dropdown-divider">
      <button class="btn btn-primary mt-3 w-100" onclick="window.location.href='signup.html'">
        <i class="fa-solid fa-rocket"></i>
        <span>Sign up</span>
      </button>
      <button class="btn btn-outline-primary mt-3 w-100" onclick="window.location.href='login.html'">
        <i class="fa fa-sign-in"></i>
        <span>Log In</span>
      </button>
    </div>
  </aside>



  <div class="container">
    <div class="job-card-container">
      <div class="job-card" id="job-card">
        <div class="card-content">
          <div class="company-info">
            <img src="company-logo.png" alt="Company Logo" class="company-logo" />
            <h3 id="company-name">Tech Corp</h3>
          </div>
          <h2 id="job-title">Software Engineer</h2>
          <div class="job-details">
            <p id="job-description">Looking for a skilled developer with experience in JavaScript and Python.</p>
            <div class="job-meta">
              <span><i class="fas fa-map-marker-alt"></i> San Francisco, CA</span>
              <span><i class="fas fa-dollar-sign"></i> $120k - $150k</span>
              <span><i class="fas fa-clock"></i> Full-time</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-controls">
      <button class="control-btn reject">
        <i class="fas fa-times"></i>
      </button>
      <button class="control-btn apply">
        <i class="fas fa-check"></i>
      </button>
    </div>
  </div>

  <div id="overlayMessage" class="overlay-message">
    <div class="overlay-content">
      <h3>Sign Up to Continue</h3>
      <p>You need to create an account to use this feature.</p>
      <div class="overlay-buttons">
        <button class="btn-primary" onclick="window.location.href='signup.html'">Sign Up Now</button>
        <button class="btn-secondary" onclick="closeOverlay()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/HTML, CSS, JS/JS/indexOverlay.js"></script>
  <script src="/HTML, CSS, JS/JS/jobCard.js"></script>
</body>
</html>
