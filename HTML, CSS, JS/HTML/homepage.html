<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobSwipe - Find Your Next Job</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="/HTML, CSS, JS/CSS/homepage.css" />
  <link rel="stylesheet" href="/HTML, CSS, JS/CSS/sidebar.css" />
</head>
<body class="logged-in">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="d-flex flex-column h-100">
      <!-- Name at top -->
      <div class="sidebar-header">
        <h1>JobSwipe</h1>
      </div>
  
      <!-- Navigation -->
      <nav class="nav nav-pills flex-column flex-grow-1">
        <a href="#" class="nav-link active">
          <i class="fas fa-home me-2"></i>
          Home
        </a>
        <a href="#" class="nav-link link-dark">
          <i class="fas fa-bookmark me-2"></i>
          Saved Jobs
        </a>
        <a href="#" class="nav-link link-dark">
          <i class="fas fa-file-alt me-2"></i>
          Applications
        </a>
      </nav>
  
      <!-- User profile at bottom -->
      <div class="mt-auto">
        <div class="dropdown">
          <a href="#" class="d-flex align-items-center link-dark text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
            <img src="https://avatars.githubusercontent.com/u/106793433?v=4" alt="" width="32px" height="32px" class="rounded-circle me-2">
            <strong>Shlok Shah</strong>
          </a>
          <ul class="dropdown-menu text-small shadow">
            <li><a class="dropdown-item" href="#"><i class="fas fa-gear me-2"></i>Settings</a></li>
            <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i>Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="login.html"><i class="fas fa-door-open me-2"></i>Sign out</a></li>
          </ul>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="container">
    <div class="job-card-container">
      <button class="nav-btn prev-btn">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div class="job-card" id="job-card">
        <div class="card-content">
          <div class="company-info">
            <img src="https://www.gstatic.com/marketing-cms/assets/images/d5/dc/cfe9ce8b4425b410b49b7f2dd3f3/g.webp=s96-fcrop64=1,00000000ffffffff-rw" alt="Company Logo" class="company-logo" />
            <h2 id="company-name">Tech Corp</h2>
          </div>
          <h2 id="job-title">Software Engineer</h2>
          <div class="job-details">
            <p id="job-description">Looking for a skilled developer with experience in JavaScript and Python.</p>
            <div class="job-meta">
              <span><i class="fas fa-map-marker-alt"></i> San Francisco, CA</span>
              <span><i class="fas fa-dollar-sign"></i> $120k - $150k</span>
              <span><i class="fas fa-clock"></i> Full-time</span>
            </div>
          </div>
        </div>
      </div>
      <button class="nav-btn next-btn">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <div class="card-controls">
      <button class="control-btn reject">
        <i class="fas fa-times"></i>
      </button>
      <button class="control-btn like">
        <i class="fas fa-heart"></i>
      </button>
      <button class="control-btn apply">
        <i class="fas fa-check"></i>
      </button>
    </div>
  </div>

  <script src="/HTML, CSS, JS/JS/homepage.js"></script>
  <script src="/HTML, CSS, JS/JS/jobCard.js"></script>
</body>
</html>
