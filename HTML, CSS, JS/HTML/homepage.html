<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobSwipe - Find Your Next Job</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/HTML, CSS, JS/CSS/homepage.css" />
  <link rel="stylesheet" href="/HTML, CSS, JS/CSS/sidebar.css" />
</head>
<body class="logged-in">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>JobSwipe</h1>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active">
        <i class="fas fa-home"></i>
        <span>Home</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="fas fa-user"></i>
        <span>Profile</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="fas fa-bookmark"></i>
        <span>Saved Jobs</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="fas fa-file-alt"></i>
        <span>Applications</span>
      </a>
      <a href="#" class="sidebar-link">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline-danger w-100 mt-3" onclick="window.location.href='login.html'">
        <i class="fa fa-sign-out"></i>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->

  <div class="container">
    <div class="job-card-container">
      <div class="job-card" id="job-card">
        <div class="card-content">
          <div class="company-info">
            <img src="company-logo.png" alt="Company Logo" class="company-logo" />
            <h3 id="company-name">Tech Corp</h3>
          </div>
          <h2 id="job-title">Software Engineer</h2>
          <div class="job-details">
            <p id="job-description">Looking for a skilled developer with experience in JavaScript and Python.</p>
            <div class="job-meta">
              <span><i class="fas fa-map-marker-alt"></i> San Francisco, CA</span>
              <span><i class="fas fa-dollar-sign"></i> $120k - $150k</span>
              <span><i class="fas fa-clock"></i> Full-time</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-controls">
      <button class="control-btn reject">
        <i class="fas fa-times"></i>
      </button>
      <button class="control-btn like">
        <i class="fas fa-heart"></i>
      </button>
      <button class="control-btn apply">
        <i class="fas fa-check"></i>
      </button>
    </div>
  </div>

  <script src="/HTML, CSS, JS/JS/homepage.js"></script>
  <script src="/HTML, CSS, JS/JS/jobCard.js"></script>
</body>
</html>
